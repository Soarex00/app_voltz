name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  api:
    name: API checks
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://app_voltz:app_voltz@localhost:5432/app_voltz?schema=public
      NODE_ENV: test
      API_PORT: 3333
      API_HOST: 127.0.0.1
      APP_ORIGIN: "*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Validate Prisma schema
        run: npx prisma validate --schema apps/api/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
